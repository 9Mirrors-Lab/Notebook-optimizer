# Syncs Portfolio OS "Next Action" on the Notebook optimizer card from the
# Notebook Optimizer Roadmap project (items in "Next Up" or "In Progress").
#
# Requires repo secret PORTFOLIO_SYNC_TOKEN:
#   - Fine-grained PAT: under "Account permissions" set Projects to Read and write
#     (Read only is not enough for updateProjectV2ItemFieldValue).
#   - Classic PAT: enable scope "project" (full control of user projects).
# GITHUB_TOKEN cannot update user-owned Projects v2 (integration not allowed).
#
# Run manually: Actions → Sync Portfolio OS Notebook next action → Run workflow

name: Sync Portfolio OS Notebook next action

on:
  workflow_dispatch:
  schedule:
    - cron: "0 12 * * *"

permissions:
  contents: read

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Sync Next Action field
        env:
          GH_TOKEN: ${{ secrets.PORTFOLIO_SYNC_TOKEN }}
        run: |
          set -euo pipefail
          if [ -z "${GH_TOKEN:-}" ]; then
            echo "::error::Add repository secret PORTFOLIO_SYNC_TOKEN (PAT with Account → Projects → Read and write, or classic scope project)."
            exit 1
          fi
          ./scripts/sync-portfolio-notebook-next-action.sh
