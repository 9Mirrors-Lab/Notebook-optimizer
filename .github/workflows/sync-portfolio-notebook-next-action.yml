# Syncs Portfolio OS "Next Action" on the Notebook optimizer card from the
# Notebook Optimizer Roadmap project (items in "Next Up" or "In Progress").
#
# Uses GITHUB_TOKEN with projects: write to update linked Projects (v2).
# If the job still cannot write to your user Projects, add a PAT with full
# project access as secret PORTFOLIO_SYNC_TOKEN and set GH_TOKEN in the step below.
#
# Run manually: Actions → Sync Portfolio OS Notebook next action → Run workflow

name: Sync Portfolio OS Notebook next action

on:
  workflow_dispatch:
  schedule:
    - cron: "0 12 * * *"

permissions:
  contents: read
  projects: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Sync Next Action field
        env:
          GH_TOKEN: ${{ github.token }}
        run: ./scripts/sync-portfolio-notebook-next-action.sh
